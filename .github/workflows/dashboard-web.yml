name: Dashboard Web

on:
  push:
    branches:
      - master
    paths:
      - 'dashboard-web/**'
      - '.github/workflows/dashboard-web.yml'
    tags:
      - 'dashboard-web-v*'
  pull_request:
    paths:
      - 'dashboard-web/**'
      - '.github/workflows/dashboard-web.yml'

env:
  DOCKER_IMAGE: vaimee/sepa-dashboard

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy files
        working-directory: dashboard-web
        run: |
          set -euo pipefail
          rm -rf deploy
          mkdir -p deploy
          cp index.html deploy/index.html
          cp js/* deploy/

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: dashboard-web
          push: false
          tags: ${{ env.DOCKER_IMAGE }}:test

  publish:
    if: startsWith(github.ref, 'refs/tags/dashboard-web-v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#dashboard-web-v}" >> "$GITHUB_ENV"

      - name: Prepare deploy files
        working-directory: dashboard-web
        run: |
          set -euo pipefail
          rm -rf deploy
          mkdir -p deploy
          cp index.html deploy/index.html
          perl -0pi -e 's/__VERSION__/$ENV{RELEASE_VERSION}/g' deploy/index.html
          timestamp=$(date +"%Y%m%d%H%M%S")
          for file in js/*; do
            [ -f "$file" ] || continue
            base=$(basename "$file")
            if [[ "$base" == *.js ]]; then
              name="${base%.*}"
              ext="${base##*.}"
              new="${name}-${RELEASE_VERSION}-${timestamp}.${ext}"
            else
              new="${base}-${RELEASE_VERSION}-${timestamp}"
            fi
            cp "$file" "deploy/$new"
            BASE="$base" NEW="$new" perl -0pi -e 's/\Q$ENV{BASE}\E/$ENV{NEW}/g' deploy/index.html
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: dashboard-web
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}
            ${{ env.DOCKER_IMAGE }}:${{ env.RELEASE_VERSION }}
            ${{ env.DOCKER_IMAGE }}:latest

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Trigger Portainer webhook
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -z "$PORTAINER_WEBHOOK_URL" ]; then
            echo "PORTAINER_WEBHOOK_URL secret is not configured; skipping webhook."
            exit 0
          fi
          curl --fail --show-error --silent --request POST "$PORTAINER_WEBHOOK_URL"

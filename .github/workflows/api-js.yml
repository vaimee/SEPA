name: API JS

on:
  push:
    branches:
      - master
    paths:
      - 'api-js/**'
      - '.github/workflows/api-js.yml'
    tags:
      - 'api-js-v*'
  pull_request:
    paths:
      - 'api-js/**'
      - '.github/workflows/api-js.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-js
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: api-js/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm run build:web
      - run: npm test

  publish:
    if: startsWith(github.ref, 'refs/tags/api-js-v')
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: write
    defaults:
      run:
        working-directory: api-js
    steps:
      - uses: actions/checkout@v4

      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#api-js-v}" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: api-js/package-lock.json

      - run: npm ci
      - run: npm version "$RELEASE_VERSION" --no-git-tag-version
      - run: npm run build
      - run: npm run build:web
      - run: npm pack
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: api-js/*.tgz

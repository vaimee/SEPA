name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build all modules
        run: mvn -B clean install -DskipTests -Dgpg.skip=true -Drevision="$RELEASE_VERSION"

      - name: Run client API integration tests
        run: mvn -B -pl client-api verify -Pwith-sepa-engine -Dgpg.skip=true -Drevision="$RELEASE_VERSION"

      - name: Upload engine log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sepa-engine-log
          path: client-api/target/sepa-engine.log

  publish-maven-central:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Publish client API to Maven Central
        run: mvn -B -pl client-api deploy -DskipTests -Drevision="$RELEASE_VERSION" -s settings.xml
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  publish-docker-hub:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push engine image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            REVISION=${{ env.RELEASE_VERSION }}
          tags: |
            vaimee/sepa:${{ github.ref_name }}
            vaimee/sepa:${{ env.RELEASE_VERSION }}
            vaimee/sepa:latest

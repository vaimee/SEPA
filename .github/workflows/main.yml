name: Release

on:
  push:
    tags:
      - 'java-v*'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#java-v}" >> "$GITHUB_ENV"

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build all modules
        run: mvn -B clean install -DskipTests -Dgpg.skip=true -Drevision="$RELEASE_VERSION"

      - name: Run client API integration tests
        run: mvn -B -pl api-java verify -Pwith-sepa-engine -Dgpg.skip=true -Drevision="$RELEASE_VERSION"

      - name: Upload engine log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sepa-engine-log
          path: api-java/target/sepa-engine.log

  publish-maven-central:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#java-v}" >> "$GITHUB_ENV"

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          PRIVATE_KEY="${GPG_PRIVATE_KEY:-$MAVEN_GPG_PRIVATE_KEY}"
          PASSPHRASE="${GPG_PASSPHRASE:-$MAVEN_GPG_PASSPHRASE}"

          if [ -z "$PRIVATE_KEY" ]; then
            echo "Missing GPG private key secret. Configure GPG_PRIVATE_KEY or MAVEN_GPG_PRIVATE_KEY."
            exit 1
          fi

          if [ -z "$PASSPHRASE" ]; then
            echo "Missing GPG passphrase secret. Configure GPG_PASSPHRASE or MAVEN_GPG_PASSPHRASE."
            exit 1
          fi

          echo "$PRIVATE_KEY" | gpg --batch --import
          echo "MAVEN_GPG_PASSPHRASE=$PASSPHRASE" >> "$GITHUB_ENV"

      - name: Publish client API to Maven Central
        run: mvn -B -pl api-java deploy -DskipTests -Drevision="$RELEASE_VERSION" -s settings.xml
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}

  publish-docker-hub:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#java-v}" >> "$GITHUB_ENV"

      - name: Set Docker image repository
        env:
          DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: echo "IMAGE_REPOSITORY=${DOCKERHUB_REPOSITORY:-${DOCKERHUB_USERNAME}/sepa}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push engine image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            REVISION=${{ env.RELEASE_VERSION }}
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ github.ref_name }}
            ${{ env.IMAGE_REPOSITORY }}:${{ env.RELEASE_VERSION }}
            ${{ env.IMAGE_REPOSITORY }}:latest

  publish-github-release:
    runs-on: ubuntu-latest
    needs:
      - publish-maven-central
      - publish-docker-hub
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#java-v}" >> "$GITHUB_ENV"

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build release artifacts
        run: mvn -B package -DskipTests -Dgpg.skip=true -Drevision="$RELEASE_VERSION"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            api-java/target/sepa-client-api-${{ env.RELEASE_VERSION }}.jar
            api-java/target/sepa-client-api-${{ env.RELEASE_VERSION }}-sources.jar
            api-java/target/sepa-client-api-${{ env.RELEASE_VERSION }}-javadoc.jar
            engine/target/sepa-engine-${{ env.RELEASE_VERSION }}.jar
            example-chat/target/sepa-example-chat-${{ env.RELEASE_VERSION }}.jar
            dashboard-java/target/sepa-dashboard-${{ env.RELEASE_VERSION }}.jar

name: API Python

on:
  push:
    branches:
      - master
    paths:
      - 'api-python/**'
      - '.github/workflows/api-python.yml'
    tags:
      - 'api-python-v*'
  pull_request:
    paths:
      - 'api-python/**'
      - '.github/workflows/api-python.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: pip
          cache-dependency-path: api-python/requirements.txt

      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m pip install build
      - run: python -m build

  publish:
    if: startsWith(github.ref, 'refs/tags/api-python-v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    defaults:
      run:
        working-directory: api-python
    steps:
      - uses: actions/checkout@v4

      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#api-python-v}" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: pip
          cache-dependency-path: api-python/requirements.txt

      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m pip install build twine

      - name: Set package version from tag
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re
          path = Path('setup.py')
          text = path.read_text()
          text = re.sub(r"version='[^']+'", f"version='{os.environ['RELEASE_VERSION']}'", text, count=1)
          path.write_text(text)
          PY

      - run: python -m build
      - run: python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: api-python/dist/*

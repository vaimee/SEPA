name: Docker Release

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  DOCKER_IMAGE: vaimee/sepa-dashboard

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Prepare deploy files
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          rm -rf deploy
          mkdir -p deploy

          cp index.html deploy/index.html
          perl -0pi -e 's/__VERSION__/$ENV{RELEASE_TAG}/g' deploy/index.html

          timestamp=$(date +"%Y%m%d%H%M%S")

          for file in js/*; do
            [ -f "$file" ] || continue

            base=$(basename "$file")

            if [[ "$base" == *.js ]]; then
              name="${base%.*}"
              ext="${base##*.}"
              new="${name}-${RELEASE_TAG}-${timestamp}.${ext}"
            else
              new="${base}-${RELEASE_TAG}-${timestamp}"
            fi

            cp "$file" "deploy/$new"
            BASE="$base" NEW="$new" perl -0pi -e 's/\Q$ENV{BASE}\E/$ENV{NEW}/g' deploy/index.html
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trigger Portainer webhook
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          if [ -z "${PORTAINER_WEBHOOK_URL}" ]; then
            echo "PORTAINER_WEBHOOK_URL secret is not configured"
            exit 1
          fi

          curl --fail --show-error --silent --request POST "${PORTAINER_WEBHOOK_URL}"
